version: '3'
services:
  discord_search_bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: discord_search_bot
    container_name: dsb
    environment:
      - DISCORD_TOKEN=$DISCORD_TOKEN
      - DATABASE_URL=sqlite:///app/data/discord_bot.db?mode=rwc
      - VERSION_CHECK_INTERVAL_SECS=86400
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
